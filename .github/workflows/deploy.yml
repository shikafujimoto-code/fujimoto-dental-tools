name: Deploy to Deno Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/deployctl@v1
        with:
          project: fujimoto-dental-tools
          entrypoint: main.ts
